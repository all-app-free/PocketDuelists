<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pocket Duelists ULTIMATE</title>

<style>
:root { --gold:#f1c40f; --win:#27ae60; --loss:#c0392b; --accent:#3498db; }

body {
    margin:0;
    font-family:'Arial Black', sans-serif;
    background:#000;
    color:white;
    overflow:hidden;
    touch-action:none;
    text-transform:uppercase;
}

#rotate-overlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100vw; height:100vh;
    background:#000;
    z-index:9999;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
@media (orientation: portrait) {
    #rotate-overlay { display:flex; }
}

.screen {
    display:none;
    width:100vw;
    height:100vh;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:absolute;
    background:radial-gradient(circle,#2c3e50 0%,#000 100%);
}
.active { display:flex; }

button {
    padding:12px 20px;
    margin:5px;
    font-size:14px;
    cursor:pointer;
    background:#e67e22;
    border:3px solid #d35400;
    border-radius:10px;
    color:white;
    font-weight:bold;
}

.top-bar {
    position:absolute;
    top:10px;
    width:95%;
    display:flex;
    justify-content:space-between;
    pointer-events:none;
    z-index:10;
}

.stat-box {
    background:rgba(0,0,0,0.8);
    padding:5px 12px;
    border-radius:15px;
    border:2px solid var(--gold);
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    width:90%;
    max-height:55%;
    overflow-y:auto;
    padding:10px;
}

.card {
    background:#34495e;
    padding:10px;
    border-radius:12px;
    border:3px solid #555;
    text-align:center;
}
.card.selected { border-color:var(--gold); }

#gameCanvas {
    background:#2ecc71;
}

.joy-area {
    position:absolute;
    bottom:30px;
    width:110px;
    height:110px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.3);
}

.knob {
    width:45px;
    height:45px;
    background:rgba(255,255,255,0.7);
    border-radius:50%;
    position:absolute;
    top:32px;
    left:32px;
}

#super-btn {
    position:absolute;
    bottom:150px;
    right:50px;
    width:70px;
    height:70px;
    background:#444;
    border-radius:50%;
    border:4px solid #222;
}
#super-btn.ready {
    background:#f1c40f;
    box-shadow:0 0 20px #f1c40f;
}

/* ========================= */
/* 🔥 GAME VISUAL UPGRADE */
/* ========================= */

</style>
</head>

<body>

<div id="rotate-overlay"><h1>ROTATE</h1></div>

<div id="menu" class="screen active">
    <h1>POCKET DUELISTS</h1>
    <button onclick="showScreen('arena')">BATTLE</button>
</div>

<div id="arena" class="screen">
    <canvas id="gameCanvas"></canvas>

    <div id="left-joy" class="joy-area" style="left:50px"><div id="l-knob" class="knob"></div></div>
    <div id="right-joy" class="joy-area" style="right:50px"><div id="r-knob" class="knob"></div></div>
    <div id="super-btn" onclick="useSuper()"></div>
</div>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player, bot, bullets = [], obstacles = [], bushes = [];
let touches = {}, gameActive = false, superCharge = 0;

/* ========================= */
/* UI */
/* ========================= */

function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    if(id==="arena") initBattle();
}

/* ========================= */
/* INIT */
/* ========================= */

function initBattle(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    player = {x:150,y:canvas.height/2,r:25,color:"#3498db",hp:100,speed:4};
    bot = {x:canvas.width-150,y:canvas.height/2,r:25,color:"red",hp:100,speed:2.8};

    bullets = [];
    obstacles = [{x:canvas.width/2-25,y:canvas.height/2-100,w:50,h:200}];
    bushes = [
        {x:250,y:150,w:120,h:120},
        {x:canvas.width-370,y:canvas.height-270,w:120,h:120}
    ];

    gameActive = true;
    requestAnimationFrame(gameLoop);
}

/* ========================= */
/* ✨ VIZUÁL */
/* ========================= */

function drawGrass(){
    let g = ctx.createRadialGradient(
        canvas.width/2,canvas.height/2,100,
        canvas.width/2,canvas.height/2,canvas.width
    );
    g.addColorStop(0,"#2ecc71");
    g.addColorStop(1,"#145a32");

    ctx.fillStyle = g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<120;i++){
        ctx.fillStyle="rgba(0,0,0,0.04)";
        ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
    }
}

function drawBush(b){
    ctx.fillStyle="#1b5e20";
    for(let i=0;i<20;i++){
        ctx.beginPath();
        ctx.arc(b.x+Math.random()*b.w,b.y+Math.random()*b.h,8+Math.random()*8,0,Math.PI*2);
        ctx.fill();
    }
}

function drawWall(o){
    ctx.fillStyle="#6d4c41";
    ctx.fillRect(o.x,o.y,o.w,o.h);

    ctx.fillStyle="rgba(255,255,255,0.1)";
    ctx.fillRect(o.x,o.y,o.w,4);

    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(o.x,o.y+o.h-4,o.w,4);

    ctx.strokeStyle="#3e2723";
    ctx.lineWidth=2;
    ctx.strokeRect(o.x,o.y,o.w,o.h);
}

function drawUnit(u){
    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.beginPath();
    ctx.arc(u.x+3,u.y+5,u.r,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle=u.color;
    ctx.beginPath();
    ctx.arc(u.x,u.y,u.r,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="#000";
    ctx.lineWidth=3;
    ctx.stroke();

    ctx.fillStyle="black";
    ctx.fillRect(u.x-25,u.y-45,50,8);

    ctx.fillStyle=u.hp>30?"#2ecc71":"#e74c3c";
    ctx.fillRect(u.x-25,u.y-45,(u.hp/100)*50,8);
}

/* ========================= */
/* GAME */
/* ========================= */

function shoot(w,a){
    bullets.push({x:w.x,y:w.y,vx:Math.cos(a)*12,vy:Math.sin(a)*12,owner:w});
}

function useSuper(){
    if(superCharge<100) return;
    superCharge=0;
    for(let a=-0.4;a<=0.4;a+=0.2) shoot(player,a);
}

function gameLoop(){
    if(!gameActive) return;

    drawGrass();

    bullets.forEach((b,i)=>{
        b.x+=b.vx;
        b.y+=b.vy;

        ctx.shadowBlur=10;
        ctx.shadowColor=b.owner===player?"white":"yellow";

        ctx.fillStyle=b.owner===player?"white":"yellow";
        ctx.beginPath();
        ctx.arc(b.x,b.y,6,0,Math.PI*2);
        ctx.fill();

        ctx.shadowBlur=0;

        let t=b.owner===player?bot:player;
        if(Math.hypot(b.x-t.x,b.y-t.y)<t.r){
            t.hp-=20;
            bullets.splice(i,1);
        }
    });

    let a=Math.atan2(player.y-bot.y,player.x-bot.x);
    bot.x+=Math.cos(a)*bot.speed*0.5;
    bot.y+=Math.sin(a)*bot.speed*0.5;

    bushes.forEach(drawBush);
    obstacles.forEach(drawWall);

    drawUnit(player);
    drawUnit(bot);

    requestAnimationFrame(gameLoop);
}

</script>
</body>
</html>
