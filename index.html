<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Duelists</title>
    <style>
        :root { --gold: #f1c40f; --win: #27ae60; --loss: #c0392b; --accent: #3498db; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #121212; color: white; overflow: hidden; touch-action: none; text-transform: uppercase; }
        
        /* Landscape Orientation Guard */
        #rotate-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media (orientation: portrait) { #rotate-overlay { display: flex; } }

        /* Screens */
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: absolute; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); }
        .active { display: flex; }
        
        /* UI Elements */
        h1 { font-size: 40px; margin-bottom: 10px; text-shadow: 3px 3px #000; color: var(--gold); }
        button { padding: 12px 25px; margin: 8px; font-size: 16px; cursor: pointer; background: #e67e22; border: 4px solid #d35400; border-radius: 12px; color: white; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #7f8c8d; border-color: #95a5a6; cursor: not-allowed; }
        
        .top-bar { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .stat-box { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; border: 2px solid var(--gold); font-size: 18px; }

        /* Pocket Shop / Selection */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 80%; max-height: 60%; overflow-y: auto; padding: 10px; }
        .card { background: #34495e; padding: 15px; border-radius: 15px; border: 4px solid #555; text-align: center; }
        .card.owned { border-color: var(--win); }
        .card.selected { border-color: var(--gold); background: #2c3e50; box-shadow: 0 0 15px var(--gold); }

        /* Game Arena */
        #gameCanvas { background: #2ecc71; background-image: radial-gradient(#27ae60 20%, transparent 20%); background-size: 50px 50px; }
        .joy-area { position: absolute; bottom: 30px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); }
        .knob { width: 45px; height: 45px; background: rgba(255,255,255,0.7); border-radius: 50%; position: absolute; top: 32.5px; left: 32.5px; }
        
        /* Results */
        #battleResult { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }

        /* Lists */
        .scroll-list { width: 85%; height: 60%; overflow-y: auto; background: rgba(0,0,0,0.6); border-radius: 15px; padding: 10px; border: 2px solid #444; }
        .list-item { background: #2c3e50; margin: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="rotate-overlay"><h1>🔄 ROTATE TO LANDSCAPE</h1></div>

    <div id="menu" class="screen active">
        <div class="top-bar">
            <div class="stat-box" id="m-trophies">🏆 0</div>
            <div class="stat-box" id="m-coins">💰 0</div>
        </div>
        <h1>POCKET DUELISTS</h1>
        <button onclick="showScreen('arena')" style="font-size: 32px; width: 220px; background: var(--win); border-color: #1e8449;">BATTLE</button>
        <div style="display:flex;">
            <button onclick="showScreen('pockets')">POCKETS</button>
            <button onclick="showScreen('trophyRoad')">ROAD</button>
            <button onclick="showScreen('battleLog')">LOG</button>
        </div>
    </div>

    <div id="pockets" class="screen">
        <h2>YOUR POCKETS</h2>
        <div id="pockets-grid" class="grid"></div>
        <button onclick="showScreen('menu')">BACK</button>
    </div>

    <div id="trophyRoad" class="screen">
        <h2>🏆 TROPHY ROAD</h2>
        <div id="road-list" class="scroll-list"></div>
        <button onclick="showScreen('menu')">BACK</button>
    </div>

    <div id="battleLog" class="screen">
        <h2>📜 BATTLE LOG</h2>
        <div id="log-list" class="scroll-list"></div>
        <button onclick="showScreen('menu')">BACK</button>
    </div>

    <div id="arena" class="screen">
        <canvas id="gameCanvas"></canvas>
        <div id="left-joy" class="joy-area" style="left: 50px;"><div id="l-knob" class="knob"></div></div>
        <div id="right-joy" class="joy-area" style="right: 50px;"><div id="r-knob" class="knob"></div></div>
        
        <div id="battleResult">
            <h1 id="resultTitle">VICTORY</h1>
            <h2 id="resultStats">VS ENEMY</h2>
            <h1 id="resultChange">+10 🏆</h1>
            <button onclick="showScreen('menu')">CONTINUE</button>
        </div>
    </div>

    <script>
        // GAME STATE
        let trophies = parseInt(localStorage.getItem('pd_trophies')) || 0;
        let coins = parseInt(localStorage.getItem('pd_coins')) || 0;
        let ownedPockets = JSON.parse(localStorage.getItem('pd_owned')) || ['Shelly'];
        let selectedPocket = localStorage.getItem('pd_selected') || 'Shelly';
        let claimedMilestones = JSON.parse(localStorage.getItem('pd_claimed')) || [];
        let battleLog = JSON.parse(localStorage.getItem('pd_log')) || [];

        const pocketsData = [
            { name: 'Shelly', color: '#3498db', speed: 4, cost: 0 },
            { name: 'Colt', color: '#e74c3c', speed: 3.5, cost: 100 },
            { name: 'Crow', color: '#8e44ad', speed: 5.5, cost: 250 },
            { name: 'Primo', color: '#f1c40f', speed: 3, cost: 500 },
            { name: 'Leon', color: '#2ecc71', speed: 6, cost: 1000 }
        ];

        const enemyNames = ["DarkKnight", "BrawlBot", "ToxicPlayer", "NoobMaster", "SuperCell-Fan", "LeonPro"];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('battleResult').style.display = 'none';
            if(id === 'menu') updateUI();
            if(id === 'pockets') renderPockets();
            if(id === 'trophyRoad') renderRoad();
            if(id === 'battleLog') renderLog();
            if(id === 'arena') initBattle();
        }

        function updateUI() {
            document.getElementById('m-trophies').innerText = `🏆 ${trophies}`;
            document.getElementById('m-coins').innerText = `💰 ${coins}`;
            localStorage.setItem('pd_trophies', trophies);
            localStorage.setItem('pd_coins', coins);
        }

        function renderPockets() {
            const grid = document.getElementById('pockets-grid');
            grid.innerHTML = pocketsData.map(p => {
                const isOwned = ownedPockets.includes(p.name);
                const isSelected = selectedPocket === p.name;
                return `
                    <div class="card ${isSelected ? 'selected' : (isOwned ? 'owned' : '')}">
                        <div style="width:40px;height:40px;background:${p.color};margin:0 auto 10px;border-radius:5px;"></div>
                        <strong>${p.name}</strong><br>
                        <small>SPD: ${p.speed}</small><br><br>
                        ${isSelected ? 'SELECTED' : (isOwned ? `<button onclick="selectP('${p.name}')">SELECT</button>` : `<button onclick="buyP('${p.name}', ${p.cost})">💰 ${p.cost}</button>`)}
                    </div>
                `;
            }).join('');
        }

        function selectP(name) { selectedPocket = name; localStorage.setItem('pd_selected', name); renderPockets(); }
        function buyP(name, cost) {
            if(coins >= cost) {
                coins -= cost; ownedPockets.push(name);
                localStorage.setItem('pd_owned', JSON.stringify(ownedPockets));
                updateUI(); selectP(name);
            } else { alert("NOT ENOUGH COINS!"); }
        }

        function renderRoad() {
            const list = document.getElementById('road-list');
            list.innerHTML = "";
            for(let i = 10; i <= 1000; i += 20) {
                const isClaimed = claimedMilestones.includes(i);
                const canClaim = trophies >= i && !isClaimed;
                list.innerHTML += `
                    <div class="list-item" style="opacity: ${trophies >= i ? 1 : 0.5}">
                        <span>${i} 🏆 - REWARD: 💰 50</span>
                        <button onclick="claim(${i})" ${!canClaim ? 'disabled' : ''}>
                            ${isClaimed ? 'CLAIMED' : (canClaim ? 'CLAIM' : 'LOCKED')}
                        </button>
                    </div>
                `;
            }
        }

        function claim(m) {
            coins += 50; claimedMilestones.push(m);
            localStorage.setItem('pd_claimed', JSON.stringify(claimedMilestones));
            updateUI(); renderRoad();
        }

        function renderLog() {
            const list = document.getElementById('log-list');
            list.innerHTML = battleLog.slice().reverse().map(l => `
                <div class="list-item" style="border-left: 6px solid ${l.win ? 'var(--win)' : 'var(--loss)'}">
                    <span>${l.win ? 'VICTORY' : 'LOSS'} vs ${l.enemy}</span>
                    <span>${l.change > 0 ? '+' : ''}${l.change} 🏆</span>
                </div>
            `).join('');
        }

        // BATTLE SYSTEM
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let player, bot, bullets, gameActive = false;
        let joyL = { x: 0, y: 0, active: false }, joyR = { x: 0, y: 0, active: false, angle: 0 };

        function initBattle() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const pData = pocketsData.find(p => p.name === selectedPocket);
            player = { x: 150, y: canvas.height/2, r: 25, color: pData.color, hp: 100, speed: pData.speed };
            bot = { x: canvas.width - 150, y: canvas.height/2, r: 25, color: 'red', hp: 100, speed: 2.5, name: enemyNames[Math.floor(Math.random()*enemyNames.length)] };
            bullets = [];
            gameActive = true;
            gameLoop();
        }

        function handleJoy(e, joy, knobId) {
            e.preventDefault();
            const touch = e.touches[0];
            const area = e.currentTarget.getBoundingClientRect();
            const centerX = area.left + area.width/2;
            const centerY = area.top + area.height/2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.min(45, Math.sqrt(dx*dx + dy*dy));
            const angle = Math.atan2(dy, dx);
            joy.x = Math.cos(angle) * (dist/45);
            joy.y = Math.sin(angle) * (dist/45);
            joy.angle = angle;
            joy.active = true;
            document.getElementById(knobId).style.transform = `translate(${joy.x*35}px, ${joy.y*35}px)`;
        }

        document.getElementById('left-joy').ontouchmove = (e) => handleJoy(e, joyL, 'l-knob');
        document.getElementById('right-joy').ontouchmove = (e) => handleJoy(e, joyR, 'r-knob');
        document.getElementById('right-joy').ontouchend = () => { if(joyR.active) shoot(player, joyR.angle); joyR.active = false; document.getElementById('r-knob').style.transform = 'translate(0,0)'; };
        document.getElementById('left-joy').ontouchend = () => { joyL.active = false; joyL.x = 0; joyL.y = 0; document.getElementById('l-knob').style.transform = 'translate(0,0)'; };

        function shoot(who, angle) { bullets.push({ x: who.x, y: who.y, vx: Math.cos(angle)*10, vy: Math.sin(angle)*10, owner: who }); }

        function gameLoop() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Move Player
            player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x + joyL.x * player.speed));
            player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y + joyL.y * player.speed));
            
            // Bot AI
            let dBot = Math.sqrt((player.x-bot.x)**2 + (player.y-bot.y)**2);
            if(dBot > 220) { bot.x += (player.x-bot.x)/dBot * bot.speed; bot.y += (player.y-bot.y)/dBot * bot.speed; }
            if(Math.random() < 0.02) shoot(bot, Math.atan2(player.y-bot.y, player.x-bot.x));

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                ctx.fillStyle = b.owner === player ? 'white' : 'orange';
                ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
                let target = b.owner === player ? bot : player;
                if(Math.sqrt((b.x-target.x)**2 + (b.y-target.y)**2) < target.r) { 
                    target.hp -= 20; bullets.splice(i, 1); 
                    if(target.hp <= 0) finishGame(b.owner === player); 
                }
                if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
            });

            drawUnit(player); drawUnit(bot);
            if(joyR.active) {
                ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(player.x, player.y);
                ctx.lineTo(player.x + Math.cos(joyR.angle)*120, player.y + Math.sin(joyR.angle)*120); ctx.stroke();
            }
            requestAnimationFrame(gameLoop);
        }

        function drawUnit(u) {
            ctx.fillStyle = u.color; ctx.beginPath(); ctx.arc(u.x, u.y, u.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = "black"; ctx.fillRect(u.x-25, u.y-45, 50, 10);
            ctx.fillStyle = u.hp > 30 ? "lime" : "red"; ctx.fillRect(u.x-25, u.y-45, (u.hp/100)*50, 10);
        }

        function finishGame(win) {
            gameActive = false;
            let change = win ? 10 : -8;
            trophies = Math.max(0, trophies + change);
            battleLog.push({ win, enemy: bot.name, change });
            localStorage.setItem('pd_log', JSON.stringify(battleLog.slice(-20))); // Keep last 20
            
            const res = document.getElementById('battleResult');
            res.style.display = 'flex';
            res.style.background = win ? 'rgba(39, 174, 96, 0.95)' : 'rgba(192, 57, 43, 0.95)';
            document.getElementById('resultTitle').innerText = win ? 'VICTORY!' : 'DEFEAT!';
            document.getElementById('resultStats').innerText = `VS ${bot.name}`;
            document.getElementById('resultChange').innerText = `${change > 0 ? '+' : ''}${change} 🏆`;
            updateUI();
        }

        updateUI();
    </script>
</body>
  </html>
