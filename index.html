<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pocket Duelists UPGRADED</title>

<style>
:root { --gold:#f1c40f; --win:#27ae60; --loss:#c0392b; }
body { margin:0; font-family:'Arial Black'; background:#000; color:white; overflow:hidden; }

.screen { display:none; width:100vw; height:100vh; justify-content:center; align-items:center; flex-direction:column; position:absolute; }
.active { display:flex; }

button { padding:10px 20px; margin:5px; font-weight:bold; }

#gameCanvas { background:#000; }

.joy-area { position:absolute; bottom:30px; width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,0.1); }
.knob { width:45px; height:45px; background:white; border-radius:50%; position:absolute; top:32px; left:32px; }

#super-btn { position:absolute; bottom:150px; right:50px; width:70px; height:70px; border-radius:50%; background:#444; }
</style>
</head>

<body>

<div id="menu" class="screen active">
<h1>POCKET DUELISTS</h1>
<button onclick="showScreen('arena')">BATTLE</button>
</div>

<div id="arena" class="screen">
<canvas id="gameCanvas"></canvas>
<div id="left-joy" class="joy-area" style="left:50px"><div id="l-knob" class="knob"></div></div>
<div id="right-joy" class="joy-area" style="right:50px"><div id="r-knob" class="knob"></div></div>
<div id="super-btn" onclick="useSuper()"></div>
</div>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let player, bot, bullets=[], obstacles=[], bushes=[];
let touches={}, superCharge=0, gameActive=false;

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="arena") initBattle();
}

function initBattle(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

player={x:150,y:canvas.height/2,r:25,color:"#3498db",hp:100,speed:4,visible:true};
bot={x:canvas.width-150,y:canvas.height/2,r:25,color:"red",hp:100,speed:2.8,visible:true};

bullets=[];
obstacles=[{x:canvas.width/2-25,y:canvas.height/2-100,w:50,h:200}];
bushes=[{x:250,y:150,w:120,h:120},{x:canvas.width-370,y:canvas.height-270,w:120,h:120}];

gameActive=true;
requestAnimationFrame(gameLoop);
}

/* ========= TEXTURY ========= */

function drawGrass(){
let g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,100,canvas.width/2,canvas.height/2,canvas.width);
g.addColorStop(0,"#2ecc71");
g.addColorStop(1,"#1e8449");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

// noise
for(let i=0;i<150;i++){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);
}
}

function drawBush(b){
ctx.fillStyle="#1b5e20";
for(let i=0;i<25;i++){
ctx.beginPath();
ctx.arc(b.x+Math.random()*b.w,b.y+Math.random()*b.h,8+Math.random()*10,0,Math.PI*2);
ctx.fill();
}
}

function drawWall(o){
ctx.fillStyle="#6d4c41";
ctx.fillRect(o.x,o.y,o.w,o.h);

// highlight
ctx.fillStyle="rgba(255,255,255,0.1)";
ctx.fillRect(o.x,o.y,o.w,5);

// shadow
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(o.x,o.y+o.h-5,o.w,5);

// outline
ctx.strokeStyle="#3e2723";
ctx.strokeRect(o.x,o.y,o.w,o.h);
}

function drawUnit(u){
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.beginPath();
ctx.arc(u.x+3,u.y+5,u.r,0,Math.PI*2);
ctx.fill();

ctx.fillStyle=u.color;
ctx.beginPath();
ctx.arc(u.x,u.y,u.r,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="#000";
ctx.lineWidth=3;
ctx.stroke();

ctx.fillStyle="black";
ctx.fillRect(u.x-25,u.y-45,50,8);

ctx.fillStyle=u.hp>30?"#2ecc71":"#e74c3c";
ctx.fillRect(u.x-25,u.y-45,(u.hp/100)*50,8);
}

/* ========= INPUT ========= */

window.addEventListener("touchstart",e=>{
Array.from(e.changedTouches).forEach(t=>{
let joy=t.target.closest(".joy-area");
touches[t.identifier]={startX:t.clientX,startY:t.clientY,curX:t.clientX,curY:t.clientY,target:joy?joy.id:null};
});
});

window.addEventListener("touchmove",e=>{
Array.from(e.changedTouches).forEach(t=>{
if(touches[t.identifier]){
touches[t.identifier].curX=t.clientX;
touches[t.identifier].curY=t.clientY;
}
});
});

window.addEventListener("touchend",e=>{
Array.from(e.changedTouches).forEach(t=>{
let touch=touches[t.identifier];
if(touch && touch.target==="right-joy"){
let dx=touch.curX-touch.startX;
let dy=touch.curY-touch.startY;
shoot(player,Math.atan2(dy,dx));
}
delete touches[t.identifier];
});
});

/* ========= GAME ========= */

function shoot(who,a){
bullets.push({x:who.x,y:who.y,vx:Math.cos(a)*12,vy:Math.sin(a)*12,owner:who});
}

function useSuper(){
if(superCharge<100) return;
superCharge=0;
for(let a=-0.4;a<=0.4;a+=0.2) shoot(player,a);
}

function gameLoop(){
if(!gameActive) return;

drawGrass();

/* movement */
Object.values(touches).forEach(t=>{
let dx=t.curX-t.startX;
let dy=t.curY-t.startY;
let dist=Math.min(45,Math.sqrt(dx*dx+dy*dy));
let angle=Math.atan2(dy,dx);

if(t.target==="left-joy"){
player.x+=Math.cos(angle)*(dist/45)*player.speed;
player.y+=Math.sin(angle)*(dist/45)*player.speed;
}
});

/* bullets */
bullets.forEach((b,i)=>{
b.x+=b.vx;
b.y+=b.vy;

// glow
ctx.shadowBlur=10;
ctx.shadowColor=b.owner===player?"white":"yellow";

ctx.fillStyle=b.owner===player?"white":"yellow";
ctx.beginPath();
ctx.arc(b.x,b.y,6,0,Math.PI*2);
ctx.fill();

ctx.shadowBlur=0;

let target=b.owner===player?bot:player;
if(Math.hypot(b.x-target.x,b.y-target.y)<target.r){
target.hp-=20;
bullets.splice(i,1);

// screen shake
canvas.style.transform="translate(3px,0)";
setTimeout(()=>canvas.style.transform="translate(0,0)",50);
}
});

/* bot AI */
let a=Math.atan2(player.y-bot.y,player.x-bot.x);
bot.x+=Math.cos(a)*bot.speed*0.5;
bot.y+=Math.sin(a)*bot.speed*0.5;
if(Math.random()<0.02) shoot(bot,a);

/* draw map */
bushes.forEach(drawBush);
obstacles.forEach(drawWall);

/* draw players */
drawUnit(player);
drawUnit(bot);

requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
